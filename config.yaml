server:
  port: 8080
  read-timeout: 5s
  write-timeout: 15s
  shutdown: 30s
  drain-window: 10s

database:
  host: localhost
  port: 5432
  user: gateway
  password: ${GATEWAY_DB_PASSWORD}
  dbname: gateway
  sslmode: disable
  max-open-conns: 10
  max-idle-conns: 10
  conn-max-lifetime: 5m

health:
  check_interval: 10s
  check_timeout: 2s

routes:
  - path: /api/test
    rewrite: /
    upstream: http://localhost:8081
    timeout: 5s
  - path: /echo
    rewrite: /echo
    upstream: http://localhost:8081
    timeout: 5s
  - path: /slow
    rewrite: /slow
    upstream: http://localhost:8081
    timeout: 15s
